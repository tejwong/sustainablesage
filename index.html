<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <title>Shawn Wong Designs</title>
</head>
<body>

    <header>
        <div class="hero">
            <h1>Welcome to Shawn Wong Designs</h1>
            <p>Your one-stop solution for design needs</p>
            <a href="#services" class="btn">Get Started</a>
        </div>
    </header>

    <section id="about">
        <h2>About Us</h2>
        <p>We specialize in providing top-notch design services...</p>
    </section>

    <section id="services">
        <h2>Our Services</h2>
        <ul>
            <li>Web Design</li>
            <li>Graphic Design</li>
            <li>Branding</li>
        </ul>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Shawn Wong Designs</p>
    </footer>

    <script>
    document.getElementById('contactForm').addEventListener('submit', function(event) {
        event.preventDefault();
        alert('Form submitted!');
    });
    </script>

</body>
</html>
